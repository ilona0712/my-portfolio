<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Intelligent Gmail Cleanup System</title>
  <desc id="desc">Abstract inbox automation illustration for a Gmail cleanup project.</desc>
  <defs>
