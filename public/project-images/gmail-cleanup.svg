      <stop offset="0%" stop-color="#150b18" />
      <stop offset="50%" stop-color="#27112a" />
      <stop offset="100%" stop-color="#120812" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <g opacity="0.16">
